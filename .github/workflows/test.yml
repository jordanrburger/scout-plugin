name: test

on:
  push:
    branches: [main, "migrate/**"]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: Setup Python
        run: uv python install ${{ matrix.python }}
      - name: Install
        run: uv pip install --system -e ".[dev]"
      - name: Pytest
        run: pytest tests/ -v
